services:
  # MOTOR CENTRAL (STAE API SOFALA) - ÚNICO SERVIÇO NO RENDER
  - type: web
    name: stae-api-sofala
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      # AQUI ESTÁ A MUDANÇA: AGUARDAMOS O LINK DO NEON MANUALMENTE
      - key: DATABASE_URL
        sync: false
